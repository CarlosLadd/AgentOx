# AgentOx policy bundle (version 1)
version: "1"

default:
  fail_on: [HIGH, CRITICAL]
  max_high: 0
  max_medium: 5
  rules:
    - category: security
      min_severity: MEDIUM
      action: fail

environments:
  dev:
    max_medium: 10
  prod:
    fail_on: [MEDIUM, HIGH, CRITICAL]
    max_medium: 0
